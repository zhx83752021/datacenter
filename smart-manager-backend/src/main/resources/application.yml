server:
  port: ${PORT:8081}
  servlet:
    context-path: /

spring:
  application:
    name: smart-manager-backend
  datasource:
    # 库名：DB_NAME（可选）→ 否则用 Railway 的 MYSQL_DATABASE → 默认 smart_manager_db
    # 仅使用 DB_*，避免 Railway 注入空串的 MYSQL_HOST 导致嵌套占位符把主机解析成空。公网：shuttle.proxy.rlwy.net + 端口；本地：不设则 localhost:3306
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:${MYSQL_DATABASE:smart_manager_db}}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.smart.manager.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Logging
logging:
  level:
    com.smart.manager: DEBUG
    org.springframework.web: INFO

# JWT Config (Custom)
jwt:
  secret: smartManagerSecretKeyShouldBeLongEnoughForHS512AlgorithmAndItMustBeSixtyFourCharactersLongToWorkCorrectly!
  expire: 86400 # 24 Hours in seconds

# 生产跨域（Vercel 等）：Railway Variables 设置 APP_CORS_ALLOWED_ORIGINS=https://tech.supperai.top
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}

# Smart Manager Business Config
smart-manager:
  etl:
    source:
      his: mock
      emr: mock
      lis: mock
    mock-enabled: true # 全局 Mock 总开关
