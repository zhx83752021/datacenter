server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: smart-manager-backend
  datasource:
    # 数据库连接占位符，请根据实际环境修改
    url: jdbc:mysql://localhost:3306/smart_manager_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.smart.manager.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Logging
logging:
  level:
    com.smart.manager: DEBUG
    org.springframework.web: INFO

# JWT Config (Custom)
jwt:
  secret: smartManagerSecretKeyShouldBeLongEnoughForHS512AlgorithmAndItMustBeSixtyFourCharactersLongToWorkCorrectly!
  expire: 86400 # 24 Hours in seconds

# Smart Manager Business Config
smart-manager:
  etl:
    source:
      his: mock
      emr: mock
      lis: mock
    mock-enabled: true # 全局 Mock 总开关
